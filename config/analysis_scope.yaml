# ==========================================
# FDA FAERS Data Collection Configuration
# ==========================================

start_date: "20040101"
end_date: "20260625"

serious_only: true
max_records_per_drug: all
page_size: 100
query_window_years: 1
filter_reactions_in_api: false
deduplicate_reports: true

# ==========================================
# Therapeutic Classes
# ==========================================

target_drugs:

  oncology:
    - pembrolizumab
    - nivolumab
    - atezolizumab
    - durvalumab
    - ipilimumab
    - trastuzumab
    - pertuzumab
    - bevacizumab
    - rituximab
    - cetuximab

  anticoagulants:
    - warfarin
    - apixaban
    - rivaroxaban
    - dabigatran
    - edoxaban
    - clopidogrel
    - ticagrelor
    - prasugrel

  antibiotics:
    - vancomycin
    - meropenem
    - piperacillin/tazobactam
    - ceftriaxone
    - linezolid
    - imipenem
    - cefepime
    - daptomycin

# ==========================================
# Historical Validation Dataset
# ==========================================

validation_drugs:

  - rofecoxib
  - vioxx
  - celecoxib
  - diclofenac
  - ibuprofen
  - naproxen

validation_period:

  start_date: "19990101"
  end_date: "20041231"

# ==========================================
# Reactions of Interest
# (Used for filtering/analysis only)
# ==========================================

priority_reactions:

  cardiovascular:
    - myocardial infarction
    - cardiac arrest
    - cerebrovascular accident
    - stroke
    - thrombosis
    - pulmonary embolism
    - deep vein thrombosis
    - hypertension
    - hypotension
    - arrhythmia
    - atrial fibrillation
    - heart failure
    - angina pectoris

  oncology:
    - pneumonitis
    - neutropenia
    - febrile neutropenia
    - cytokine release syndrome
    - hepatotoxicity
    - immune-mediated hepatitis
    - myocarditis
    - colitis
    - endocrine disorder
    - thyroiditis
    - adrenal insufficiency
    - infusion related reaction

  infectious_disease:
    - acute kidney injury
    - nephrotoxicity
    - anaphylactic reaction
    - clostridium difficile infection
    - hepatotoxicity
    - severe cutaneous adverse reaction
    - stevens-johnson syndrome
    - toxic epidermal necrolysis
    - drug rash with eosinophilia and systemic symptoms
    - thrombocytopenia

# ==========================================
# Serious Outcomes
# ==========================================

serious_outcomes:

  - death
  - life threatening
  - hospitalization
  - disability
  - congenital anomaly
  - other serious outcome

# ==========================================
# Output Configuration
# ==========================================

output:

  raw_directory: "data/raw"
  processed_directory: "data/processed"
  log_directory: "logs"

  save_json: true
  save_csv: true
